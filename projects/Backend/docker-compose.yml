services:
  mysql:
    image: mysql:8.0
    container_name: web-bookshelf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - web-bookshelf-mysql-data:/var/lib/mysql

volumes:
  web-bookshelf-mysql-data:
